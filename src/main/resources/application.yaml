server:
  port: 8080

spring:
  application:
    name: upi-without-internet
  datasource:
    url: jdbc:h2:mem:upimesh
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.upimesh: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

upi:
  mesh:
    idempotency-ttl-seconds: 86400
    packet-max-age-seconds: 86400
    token-ttl-seconds: 86400
    per-hop-seconds: 300